<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITTAX — Controle de Tarefas</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F47B20;
    --orange-dark: #D96A10;
    --orange-light: #FFA04D;
    --orange-glow: rgba(244,123,32,0.18);
    --black: #0D0D0D;
    --surface: #161616;
    --surface2: #1F1F1F;
    --surface3: #282828;
    --border: rgba(244,123,32,0.18);
    --border-strong: rgba(244,123,32,0.4);
    --text: #F0F0F0;
    --text-muted: #888;
    --text-dim: #555;
    --radius: 6px;
    --radius-lg: 10px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--black); }
  body { font-family: 'Barlow', sans-serif; background: var(--black); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

  /* HEADER */
  .header { background: var(--surface); border-bottom: 1px solid var(--border-strong); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.08em; color: var(--orange); text-transform: uppercase; }
  .logo span { color: var(--text); }
  .header-actions { display: flex; gap: 10px; align-items: center; }

  /* BUTTONS */
  .btn { font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: var(--radius); border: none; cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary { background: var(--orange); color: #000; }
  .btn-primary:hover { background: var(--orange-light); transform: translateY(-1px); }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border-strong); }
  .btn-ghost:hover { border-color: var(--orange); color: var(--orange); }
  .btn-danger { background: transparent; color: #e05555; border: 1px solid rgba(224,85,85,0.3); font-size: 12px; padding: 5px 10px; }
  .btn-danger:hover { background: rgba(224,85,85,0.1); }

  /* TABS */
  .tabs-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: flex-end; gap: 4px; }
  .tab { font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; padding: 12px 20px; background: transparent; border: none; cursor: pointer; color: var(--text-muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.15s; letter-spacing: 0.04em; text-transform: uppercase; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--orange); border-bottom-color: var(--orange); }
  .tab-count { display: inline-block; background: var(--surface3); color: var(--text-muted); font-size: 11px; padding: 1px 6px; border-radius: 99px; margin-left: 6px; }
  .tab.active .tab-count { background: var(--orange-glow); color: var(--orange); }

  /* MAIN */
  .main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

  /* STATS */
  .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 18px; cursor: pointer; transition: border-color 0.15s; }
  .stat-card:hover { border-color: var(--border-strong); }
  .stat-card.active-filter { border-color: var(--orange); box-shadow: 0 0 0 1px var(--orange); }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-val { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-val.orange { color: var(--orange); }
  .stat-val.amber { color: #F4A620; }
  .stat-val.green { color: #4CAF7D; }
  .stat-val.red { color: #E05555; }

  /* TOOLBAR */
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .search-box { position: relative; flex: 1; min-width: 200px; max-width: 340px; }
  .search-box input { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px; padding: 8px 12px 8px 34px; outline: none; transition: border-color 0.15s; }
  .search-box input:focus { border-color: var(--orange); }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-dim); }
  select.filter-sel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); font-family: 'Barlow', sans-serif; font-size: 13px; padding: 8px 12px; outline: none; cursor: pointer; transition: border-color 0.15s; }
  select.filter-sel:focus { border-color: var(--orange); color: var(--text); }
  .toolbar-spacer { flex: 1; }
  .results-count { font-size: 12px; color: var(--text-dim); }

  /* TABLE */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--surface2); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; transition: color 0.12s; }
  thead th:hover { color: var(--orange); }
  thead th.sorted { color: var(--orange); }
  thead th .sa { margin-left: 4px; opacity: 0.5; font-size: 10px; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; cursor: pointer; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody td { padding: 10px 14px; vertical-align: middle; }
  .col-num { width: 80px; font-weight: 700; color: var(--orange); font-size: 13px; }
  .col-title { }
  .col-date { width: 110px; white-space: nowrap; }
  .col-status { width: 145px; }
  .col-tickets { width: 170px; }
  .col-actions { width: 80px; text-align: center; }
  .title-text { color: var(--text); font-size: 13px; line-height: 1.4; }
  .date-text { font-size: 12px; color: var(--text-muted); font-weight: 500; }

  .ticket-tag { display: inline-block; background: rgba(244,123,32,0.08); border: 1px solid rgba(244,123,32,0.2); color: var(--orange); border-radius: 4px; padding: 1px 6px; font-size: 11px; font-weight: 600; margin: 1px 2px 1px 0; }
  .ticket-more { display: inline-block; background: var(--surface3); color: var(--text-dim); border-radius: 4px; padding: 1px 6px; font-size: 11px; }

  /* STATUS BADGE */
  .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: opacity 0.15s; border: none; white-space: nowrap; }
  .status-badge:hover { opacity: 0.8; }
  .status-badge .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .s-aberto { background: rgba(244,123,32,0.12); color: var(--orange); }
  .s-aberto .dot { background: var(--orange); }
  .s-andamento { background: rgba(244,166,32,0.12); color: #F4A620; }
  .s-andamento .dot { background: #F4A620; }
  .s-concluido { background: rgba(76,175,125,0.12); color: #4CAF7D; }
  .s-concluido .dot { background: #4CAF7D; }
  .s-bloqueado { background: rgba(224,85,85,0.12); color: #E05555; }
  .s-bloqueado .dot { background: #E05555; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }

  /* PAGINATION */
  .pagination { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; font-size: 12px; color: var(--text-muted); }
  .pag-btns { display: flex; gap: 4px; }
  .pag-btns button { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); padding: 5px 10px; font-size: 12px; font-family: 'Barlow', sans-serif; cursor: pointer; transition: all 0.12s; min-width: 30px; }
  .pag-btns button:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); }
  .pag-btns button:disabled { opacity: 0.3; cursor: default; }
  .pag-btns button.active { background: var(--orange); border-color: var(--orange); color: #000; font-weight: 700; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius-lg); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid var(--border); }
  .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); text-transform: uppercase; }
  .modal-close { background: transparent; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px; transition: color 0.12s; }
  .modal-close:hover { color: var(--orange); }
  .modal-body { padding: 22px; }
  .form-row { margin-bottom: 18px; }
  .form-label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 7px; }
  .form-label span { color: var(--orange); }
  .form-input, .form-textarea, .form-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px; padding: 10px 12px; outline: none; transition: border-color 0.15s; }
  .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--orange); }
  .form-input::placeholder, .form-textarea::placeholder { color: var(--text-dim); }
  .form-textarea { resize: vertical; min-height: 60px; }
  .form-select { cursor: pointer; }
  .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 22px; border-top: 1px solid var(--border); }
  .tickets-input-wrap { display: flex; gap: 8px; }
  .tickets-input-wrap input { flex: 1; }
  .ticket-tags-preview { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; }
  .ticket-remove { background: rgba(244,123,32,0.08); border: 1px solid rgba(244,123,32,0.2); color: var(--orange); border-radius: 4px; padding: 2px 8px; font-size: 12px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: background 0.12s; }
  .ticket-remove:hover { background: rgba(244,123,32,0.2); }

  /* DETAIL */
  .detail-section { margin-bottom: 18px; }
  .detail-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
  .detail-val { font-size: 14px; color: var(--text); line-height: 1.5; }
  .detail-num { font-size: 22px; font-weight: 700; color: var(--orange); }

  /* TOAST */
  .toast { position: fixed; bottom: 28px; right: 28px; background: var(--surface2); border: 1px solid var(--border-strong); border-left: 3px solid var(--orange); border-radius: var(--radius); padding: 12px 18px; font-size: 13px; color: var(--text); z-index: 9999; opacity: 0; transform: translateY(10px); transition: all 0.2s ease; pointer-events: none; max-width: 280px; }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header class="header">
  <div class="logo">SIT<span>TAX</span> — Controle de Tarefas</div>
  <div class="header-actions">
    <button class="btn btn-primary" onclick="openAddModal()">
      <svg width="14" height="14" fill="none" viewBox="0 0 16 16"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
      Nova Tarefa
    </button>
  </div>
</header>

<div class="tabs-bar">
  <button class="tab active" id="tab-SITTAX" onclick="switchTab('SITTAX')">SITTAX <span class="tab-count" id="cnt-SITTAX">0</span></button>
  <button class="tab" id="tab-BYTOKEN" onclick="switchTab('BYTOKEN')">BYTOKEN <span class="tab-count" id="cnt-BYTOKEN">0</span></button>
</div>

<div class="main">
  <div class="stats-row">
    <div class="stat-card" onclick="filterStat('')" id="stat-total"><div class="stat-label">Total</div><div class="stat-val orange" id="s-total">0</div></div>
    <div class="stat-card" onclick="filterStat('Aberto')" id="stat-Aberto"><div class="stat-label">Aberto</div><div class="stat-val" id="s-Aberto">0</div></div>
    <div class="stat-card" onclick="filterStat('Em andamento')" id="stat-Emandamento"><div class="stat-label">Em andamento</div><div class="stat-val amber" id="s-Em andamento">0</div></div>
    <div class="stat-card" onclick="filterStat('Concluído')" id="stat-Concluido"><div class="stat-label">Concluído</div><div class="stat-val green" id="s-Concluído">0</div></div>
    <div class="stat-card" onclick="filterStat('Bloqueado')" id="stat-Bloqueado"><div class="stat-label">Bloqueado</div><div class="stat-val red" id="s-Bloqueado">0</div></div>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <svg class="search-icon" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10 10l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="search" placeholder="Buscar tarefa ou ticket..." oninput="applyFilters()">
    </div>
    <select class="filter-sel" id="statusFilter" onchange="applyFilters()">
      <option value="">Todos os status</option>
      <option>Aberto</option>
      <option>Em andamento</option>
      <option>Concluído</option>
      <option>Bloqueado</option>
    </select>
    <select class="filter-sel" id="dateFilter" onchange="applyFilters()">
      <option value="">Todas as datas</option>
    </select>
    <button class="btn btn-ghost" onclick="clearFilters()">Limpar</button>
    <div class="toolbar-spacer"></div>
    <select class="filter-sel" id="perPage" onchange="applyFilters()">
      <option value="15">15 / página</option>
      <option value="30">30 / página</option>
      <option value="50">50 / página</option>
      <option value="100">100 / página</option>
    </select>
    <span class="results-count" id="results-count"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('num')">Nº <span class="sa" id="arr-num">↕</span></th>
          <th onclick="sortBy('title')">Título da Tarefa <span class="sa" id="arr-title">↕</span></th>
          <th onclick="sortBy('date')">Data de Abertura <span class="sa" id="arr-date">↕</span></th>
          <th>Status</th>
          <th>Tickets Vinculados</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="pagination">
    <span id="pag-info"></span>
    <div class="pag-btns" id="pag-btns"></div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="addModal" onclick="closeModalOutside(event,'addModal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="addModalTitle">Nova Tarefa</div>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div class="form-row">
        <label class="form-label">Nº da Tarefa <span>*</span></label>
        <input class="form-input" type="number" id="f-num" placeholder="Ex: 22500">
      </div>
      <div class="form-row">
        <label class="form-label">Título da Tarefa <span>*</span></label>
        <textarea class="form-textarea" id="f-title" placeholder="Descreva a tarefa..." rows="3"></textarea>
      </div>
      <div class="form-row-2">
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">Data de Abertura <span>*</span></label>
          <input class="form-input" type="date" id="f-date">
        </div>
        <div class="form-row" style="margin-bottom:0">
          <label class="form-label">Status</label>
          <select class="form-select" id="f-status">
            <option>Aberto</option>
            <option>Em andamento</option>
            <option>Concluído</option>
            <option>Bloqueado</option>
          </select>
        </div>
      </div>
      <div class="form-row" style="margin-top:18px">
        <label class="form-label">Produto</label>
        <select class="form-select" id="f-tab">
          <option>SITTAX</option>
          <option>BYTOKEN</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label">Tickets Vinculados</label>
        <div class="tickets-input-wrap">
          <input class="form-input" type="text" id="f-ticket-input" placeholder="Número do ticket (Enter para adicionar)">
          <button class="btn btn-ghost" onclick="addTicketTag()">+ Add</button>
        </div>
        <div class="ticket-tags-preview" id="ticket-tags"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('addModal')">Cancelar</button>
      <button class="btn btn-primary" onclick="saveTask()">Salvar Tarefa</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal" onclick="closeModalOutside(event,'detailModal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Detalhes da Tarefa</div>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="detail-section">
        <div class="detail-section-title">Identificação</div>
        <div class="detail-num" id="d-num"></div>
        <div class="detail-val" id="d-title" style="margin-top:8px;font-size:15px;font-weight:600;line-height:1.4"></div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Data de Abertura</div>
        <div class="detail-val" id="d-date"></div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Status atual</div>
        <div id="d-status-badge"></div>
        <div style="margin-top:12px">
          <label class="form-label">Alterar status</label>
          <select class="form-select" id="d-status-sel" onchange="updateStatusFromDetail()">
            <option>Aberto</option>
            <option>Em andamento</option>
            <option>Concluído</option>
            <option>Bloqueado</option>
          </select>
        </div>
      </div>
      <div class="detail-section">
        <div class="detail-section-title">Tickets vinculados</div>
        <div id="d-tickets"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="openEditFromDetail()">Editar</button>
      <button class="btn btn-primary" onclick="closeModal('detailModal')">Fechar</button>
    </div>
  </div>
</div>

<!-- STATUS QUICK MODAL -->
<div class="modal-overlay" id="statusModal" onclick="closeModalOutside(event,'statusModal')">
  <div class="modal" style="max-width:320px">
    <div class="modal-header">
      <div class="modal-title">Alterar Status</div>
      <button class="modal-close" onclick="closeModal('statusModal')">✕</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:8px;font-size:13px;color:var(--text-muted)" id="status-task-label"></div>
      <div style="display:flex;flex-direction:column;gap:8px" id="status-options"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STATUSES = ['Aberto','Em andamento','Concluído','Bloqueado'];
const STATUS_CLASS = {'Aberto':'s-aberto','Em andamento':'s-andamento','Concluído':'s-concluido','Bloqueado':'s-bloqueado'};

// date dd/mm/yyyy -> sortable string yyyymmdd
function dateToSort(d) {
  if(!d) return '';
  const p = d.split('/');
  return p.length === 3 ? p[2]+p[1]+p[0] : d;
}

let statusMap = {};
let activeTab = 'SITTAX';
let sortKey = 'num', sortDir = 1;
let page = 1;
let tempTickets = [];
let detailNum = null;

function getItems(tab) {
  return (data[tab]||[]).map(r => ({
    num: parseInt(r[0]), title: r[1], date: r[2], tickets: String(r[3]),
    status: statusMap[parseInt(r[0])] || 'Aberto'
  }));
}

function switchTab(t) {
  activeTab = t;
  page = 1;
  document.getElementById('statusFilter').value = '';
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.id === 'tab-'+t));
  document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter'));
  populateDateFilter();
  applyFilters();
}

function populateDateFilter() {
  const dates = [...new Set((data[activeTab]||[]).map(r => r[2]))].sort((a,b) => dateToSort(a).localeCompare(dateToSort(b)));
  const sel = document.getElementById('dateFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Todas as datas</option>' +
    dates.map(d => `<option value="${d}"${d===cur?' selected':''}>${d}</option>`).join('');
}

function clearFilters() {
  document.getElementById('search').value = '';
  document.getElementById('statusFilter').value = '';
  document.getElementById('dateFilter').value = '';
  document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter'));
  page = 1;
  applyFilters();
}

function filterStat(s) {
  document.getElementById('statusFilter').value = s;
  document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('active-filter'));
  const ids = {'':`stat-total`,'Aberto':'stat-Aberto','Em andamento':'stat-Emandamento','Concluído':'stat-Concluido','Bloqueado':'stat-Bloqueado'};
  const el = document.getElementById(ids[s]);
  if(el) el.classList.add('active-filter');
  page = 1;
  applyFilters();
}

function sortBy(k) {
  if(sortKey === k) sortDir *= -1; else { sortKey = k; sortDir = 1; }
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  const sf = document.getElementById('statusFilter').value;
  const df = document.getElementById('dateFilter').value;
  const pp = parseInt(document.getElementById('perPage').value);

  ['SITTAX','BYTOKEN'].forEach(t => {
    document.getElementById('cnt-'+t).textContent = (data[t]||[]).length;
  });

  const allItems = getItems(activeTab);
  const counts = { total: allItems.length };
  STATUSES.forEach(s => counts[s] = allItems.filter(i => i.status === s).length);
  document.getElementById('s-total').textContent = counts.total;
  STATUSES.forEach(s => document.getElementById('s-'+s).textContent = counts[s]);

  let items = allItems.filter(i => {
    if(q && !String(i.num).includes(q) && !i.title.toLowerCase().includes(q) && !i.tickets.toLowerCase().includes(q)) return false;
    if(sf && i.status !== sf) return false;
    if(df && i.date !== df) return false;
    return true;
  });

  items.sort((a,b) => {
    let av = a[sortKey], bv = b[sortKey];
    if(sortKey === 'date') { av = dateToSort(av); bv = dateToSort(bv); }
    if(typeof av === 'string') return av.localeCompare(bv,'pt') * sortDir;
    return (av - bv) * sortDir;
  });

  ['num','title','date'].forEach(k => {
    document.getElementById('arr-'+k).textContent = sortKey===k ? (sortDir>0?'↑':'↓') : '↕';
  });

  const total = items.length;
  const totalPages = Math.max(1, Math.ceil(total/pp));
  if(page > totalPages) page = totalPages;
  const start = (page-1)*pp;
  const pageItems = items.slice(start, start+pp);

  document.getElementById('results-count').textContent = `${total} tarefa${total!==1?'s':''} encontrada${total!==1?'s':''}`;

  const tbody = document.getElementById('tbody');
  if(!pageItems.length) {
    tbody.innerHTML = '<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">◎</div><div>Nenhuma tarefa encontrada</div></div></td></tr>';
  } else {
    tbody.innerHTML = pageItems.map(i => {
      const tkts = i.tickets === '0' ? [] : i.tickets.split('|').map(t=>t.trim()).filter(Boolean);
      const tktHtml = !tkts.length
        ? '<span style="color:var(--text-dim);font-size:11px">—</span>'
        : tkts.slice(0,3).map(t=>`<span class="ticket-tag">${t}</span>`).join('') +
          (tkts.length>3?`<span class="ticket-more">+${tkts.length-3}</span>`:'');
      return `<tr onclick="openDetail(${i.num})">
        <td class="col-num">#${i.num}</td>
        <td class="col-title"><div class="title-text">${i.title}</div></td>
        <td class="col-date"><span class="date-text">${i.date}</span></td>
        <td class="col-status">
          <button class="status-badge ${STATUS_CLASS[i.status]}" onclick="openStatusModal(event,${i.num})">
            <span class="dot"></span>${i.status}
          </button>
        </td>
        <td class="col-tickets">${tktHtml}</td>
        <td class="col-actions" onclick="event.stopPropagation()">
          <button class="btn btn-danger" onclick="deleteTask(${i.num})">Excluir</button>
        </td>
      </tr>`;
    }).join('');
  }

  const btns = document.getElementById('pag-btns');
  let html = `<button ${page===1?'disabled':''} onclick="goPage(${page-1})">‹</button>`;
  let s2=Math.max(1,page-2), e2=Math.min(totalPages,s2+4);
  if(e2-s2<4) s2=Math.max(1,e2-4);
  for(let p2=s2;p2<=e2;p2++) html+=`<button class="${p2===page?'active':''}" onclick="goPage(${p2})">${p2}</button>`;
  html+=`<button ${page===totalPages?'disabled':''} onclick="goPage(${page+1})">›</button>`;
  btns.innerHTML = html;
  document.getElementById('pag-info').textContent = `Mostrando ${start+1}–${Math.min(start+pp,total)} de ${total}`;
}

function goPage(p) { page=p; applyFilters(); }

function openStatusModal(e,num) {
  e.stopPropagation();
  const item = getItems(activeTab).find(i=>i.num===num);
  document.getElementById('status-task-label').textContent = '#'+num;
  document.getElementById('status-options').innerHTML = STATUSES.map(s=>
    `<button onclick="setStatus(${num},'${s}')" style="text-align:left;padding:10px 14px;border-radius:6px;border:1px solid ${item.status===s?'var(--orange)':'var(--border)'};background:${item.status===s?'var(--orange-glow)':'transparent'};cursor:pointer;display:flex;align-items:center;gap:8px">
      <span class="status-badge ${STATUS_CLASS[s]}" style="pointer-events:none"><span class="dot"></span>${s}</span>
      ${item.status===s?'<span style="margin-left:auto;color:var(--orange);font-size:12px">✓ atual</span>':''}
    </button>`
  ).join('');
  document.getElementById('statusModal').classList.add('open');
}

function setStatus(num,s) { statusMap[num]=s; closeModal('statusModal'); applyFilters(); showToast(`Status atualizado: "${s}"`); }

function openDetail(num) {
  const item = getItems(activeTab).find(i=>i.num===num);
  if(!item) return;
  detailNum = num;
  document.getElementById('d-num').textContent = '#'+item.num;
  document.getElementById('d-title').textContent = item.title;
  document.getElementById('d-date').textContent = item.date;
  document.getElementById('d-status-badge').innerHTML = `<span class="status-badge ${STATUS_CLASS[item.status]}"><span class="dot"></span>${item.status}</span>`;
  document.getElementById('d-status-sel').value = item.status;
  const tkts = item.tickets==='0'?[]:item.tickets.split('|').map(t=>t.trim()).filter(Boolean);
  document.getElementById('d-tickets').innerHTML = tkts.length
    ? `<div style="display:flex;flex-wrap:wrap;gap:5px">${tkts.map(t=>`<span class="ticket-tag">${t}</span>`).join('')}</div>`
    : '<span style="color:var(--text-dim);font-size:13px">Sem tickets vinculados</span>';
  document.getElementById('detailModal').classList.add('open');
}

function updateStatusFromDetail() {
  if(detailNum===null) return;
  const s = document.getElementById('d-status-sel').value;
  statusMap[detailNum]=s;
  const item = getItems(activeTab).find(i=>i.num===detailNum);
  document.getElementById('d-status-badge').innerHTML=`<span class="status-badge ${STATUS_CLASS[s]}"><span class="dot"></span>${s}</span>`;
  applyFilters(); showToast('Status atualizado');
}

function openEditFromDetail() { closeModal('detailModal'); const item=getItems(activeTab).find(i=>i.num===detailNum); if(item) openAddModal(item); }

function openAddModal(item) {
  tempTickets=[];
  if(item) {
    document.getElementById('addModalTitle').textContent='Editar Tarefa';
    document.getElementById('editId').value=item.num;
    document.getElementById('f-num').value=item.num;
    document.getElementById('f-title').value=item.title;
    // convert dd/mm/yyyy -> yyyy-mm-dd for input[type=date]
    const p=item.date.split('/');
    document.getElementById('f-date').value=p.length===3?`${p[2]}-${p[1]}-${p[0]}`:'';
    document.getElementById('f-status').value=item.status;
    document.getElementById('f-tab').value=activeTab;
    tempTickets=item.tickets==='0'?[]:item.tickets.split('|').map(t=>t.trim()).filter(Boolean);
  } else {
    document.getElementById('addModalTitle').textContent='Nova Tarefa';
    document.getElementById('editId').value='';
    document.getElementById('f-num').value='';
    document.getElementById('f-title').value='';
    document.getElementById('f-date').value='';
    document.getElementById('f-status').value='Aberto';
    document.getElementById('f-tab').value=activeTab;
  }
  renderTicketTags();
  document.getElementById('addModal').classList.add('open');
}

document.getElementById('f-ticket-input').addEventListener('keydown',function(e){ if(e.key==='Enter'){e.preventDefault();addTicketTag();} });

function addTicketTag() {
  const inp=document.getElementById('f-ticket-input');
  const val=inp.value.trim();
  if(val&&!tempTickets.includes(val)) { tempTickets.push(val); renderTicketTags(); }
  inp.value=''; inp.focus();
}
function removeTicketTag(i) { tempTickets.splice(i,1); renderTicketTags(); }
function renderTicketTags() {
  document.getElementById('ticket-tags').innerHTML=tempTickets.map((t,i)=>
    `<span class="ticket-remove"><span>${t}</span><span style="font-size:14px;line-height:1" onclick="removeTicketTag(${i})">×</span></span>`
  ).join('');
}

function saveTask() {
  const num=parseInt(document.getElementById('f-num').value);
  const title=document.getElementById('f-title').value.trim();
  const dateRaw=document.getElementById('f-date').value; // yyyy-mm-dd
  const status=document.getElementById('f-status').value;
  const tab=document.getElementById('f-tab').value;
  const editId=document.getElementById('editId').value;
  if(!num||!title||!dateRaw){showToast('Preencha os campos obrigatórios');return;}
  // convert to dd/mm/yyyy
  const dp=dateRaw.split('-');
  const date=`${dp[2]}/${dp[1]}/${dp[0]}`;
  const tickets=tempTickets.length?tempTickets.join(' | '):'0';
  if(editId) {
    const oldNum=parseInt(editId);
    ['SITTAX','BYTOKEN'].forEach(t=>{data[t]=(data[t]||[]).filter(r=>parseInt(r[0])!==oldNum);});
    statusMap[num]=status; if(oldNum!==num) delete statusMap[oldNum];
  } else { statusMap[num]=status; }
  if(!data[tab]) data[tab]=[];
  const exists=(data[tab]||[]).some(r=>parseInt(r[0])===num);
  if(exists&&!editId){showToast('Número já existe nesta aba');return;}
  data[tab].push([num,title,date,tickets]);
  data[tab].sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
  closeModal('addModal');
  if(tab!==activeTab) switchTab(tab); else { populateDateFilter(); applyFilters(); }
  showToast(editId?'Tarefa atualizada!':'Tarefa criada!');
}

function deleteTask(num) {
  if(!confirm(`Excluir tarefa #${num}?`)) return;
  data[activeTab]=(data[activeTab]||[]).filter(r=>parseInt(r[0])!==num);
  delete statusMap[num];
  populateDateFilter(); applyFilters(); showToast('Tarefa excluída');
}

function closeModal(id){document.getElementById(id).classList.remove('open');}
function closeModalOutside(e,id){if(e.target.id===id)closeModal(id);}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}

populateDateFilter();
applyFilters();
</script>
</body>
</html>
